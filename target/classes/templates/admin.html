<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | Daily Fancy Jewels</title>
    <link rel="stylesheet" th:href="@{/styles.css}" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" th:href="@{/}">
        <span class="brand-mark">D</span>
        <span>Daily Fancy Jewels</span>
      </a>
      <nav class="main-nav">
        <a th:href="@{/}">Storefront</a>
        <a class="admin-link" th:href="@{/admin}">Admin Portal</a>
      </nav>
    </header>

    <main>
      <section class="admin-page">
        <div class="admin-heading">
          <div>
            <p class="eyebrow">Private Management Tools</p>
            <h1>Admin Inventory</h1>
          </div>
        </div>

        <form class="admin-form" th:action="@{/admin/items}" th:object="${item}" method="post" enctype="multipart/form-data">
          <input type="hidden" th:field="*{id}" />
          <label>
            Product name
            <input th:field="*{name}" type="text" required />
          </label>
          <label>
            Category
            <select th:field="*{category}" required>
              <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}"></option>
            </select>
          </label>
          <label>
            Price
            <input th:field="*{price}" type="text" required />
          </label>
          <label>
            Upload Item Image
            <input type="file" name="imageFile" accept="image/*" th:required="${item.id == null}" />
          </label>
          <label class="wide">
            Description
            <textarea th:field="*{description}" rows="3" required></textarea>
          </label>
          <div class="form-actions wide">
            <button class="button primary" type="submit" th:text="*{id} == null ? 'Save Item' : 'Update Item'"></button>
            <a class="button secondary" th:href="@{/admin}">Clear</a>
          </div>
        </form>

        <div class="admin-list">
          <article class="admin-row" th:each="product : ${items}">
            <img th:src="${product.imageUrl}" alt="" />
            <div>
              <strong th:text="${product.name}"></strong>
              <p><span th:text="${product.category}"></span> · <span th:text="${product.price}"></span></p>
            </div>
            <div class="row-actions">
              <a class="icon-button" th:href="@{/admin/edit/{id}(id=${product.id})}">Edit</a>
              <form th:action="@{/admin/delete/{id}(id=${product.id})}" method="post">
                <button class="icon-button delete" type="submit">Remove</button>
              </form>
            </div>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
